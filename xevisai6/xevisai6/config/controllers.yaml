controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    # ĐỔI TYPE Ở ĐÂY
    arm_controller:
      type: position_controllers/JointGroupPositionController

    # ĐỔI TYPE Ở ĐÂY
    prismatic_controller:
      type: position_controllers/JointGroupPositionController
joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ["left_joint"]
    right_wheel_names: ["right_joint"]
    wheel_separation: 0.145
    wheel_radius: 0.05
    publish_rate: 50.0
    base_frame_id: base_link
    odom_frame_id: odom
    use_stamped_vel: false

arm_controller:
  ros__parameters:
    joints:
      - rotary_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

prismatic_controller:
  ros__parameters:
    joints:
      - prismatic_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
